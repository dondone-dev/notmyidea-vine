{% if DEFAULT_PAGINATION %}
<nav class="pagination" aria-label="分页导航">
    {% if articles_page.has_previous() %}
        <a href="{{ SITEURL }}/{{ articles_previous_page.url }}" class="page-btn prev" rel="prev">
            <span class="page-btn-icon" aria-hidden="true">
                <svg class="lucide-icon icon-chevron-left" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
            </span>
            <span>上一页</span>
        </a>
    {% endif %}

    <span class="page-info">
        第 {{ articles_page.number }} 页，共 {{ articles_paginator.num_pages }} 页
    </span>

    {% if articles_page.has_next() %}
        <a href="{{ SITEURL }}/{{ articles_next_page.url }}" class="page-btn next" rel="next">
            <span>下一页</span>
            <span class="page-btn-icon" aria-hidden="true">
                <svg class="lucide-icon icon-chevron-right" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6" />
                </svg>
            </span>
        </a>
    {% endif %}
</nav>
{% endif %}
